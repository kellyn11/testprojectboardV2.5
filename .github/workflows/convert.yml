name: Convert DOCX to Markdown

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Show input files
        run: |
          echo "=== INPUT FOLDER ==="
          ls -R input || true

      - name: Convert stories.docx to stories.md
        run: |
          mkdir -p output
          rm -f output/stories.md
          pandoc input/stories.docx -t markdown -o output/stories.md

      - name: Show generated markdown
        run: |
          echo "=== OUTPUT FILE ==="
          cat output/stories.md || true

      - name: Commit updated markdown
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add output/stories.md
          git commit -m "Update stories.md from stories.docx" || echo "No changes to commit"
          git push
