name: Create Issues from Flattened Stories Markdown

on:
  workflow_dispatch:

jobs:
  create-issues:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Authenticate GitHub CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh auth status

      - name: Create issues from stories.md
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          FILE="output/stories.md"

          if [ ! -f "$FILE" ]; then
            echo "Missing $FILE"
            exit 1
          fi

          current_section="General"
          pending_sn=""
          pending_text=""

          flush_row() {
            if [ -z "$pending_sn" ] || [ -z "$pending_text" ]; then
              return
            fi

            text="$(echo "$pending_text" | tr '\n' ' ' | sed 's/  */ /g' | sed 's/^ *//;s/ *$//')"

            if [[ "$text" == *"AC1:"* ]]; then
              story="${text%%AC1:*}"
              ac="AC1:${text#*AC1:}"
            else
              story="$text"
              ac=""
            fi

            story="$(echo "$story" | sed 's/^ *//;s/ *$//')"
            ac="$(echo "$ac" | sed 's/^ *//;s/ *$//')"

            title="US${pending_sn}"

            body=$(printf "**Section:** %s\n\n**User Story**\n%s\n\n**Acceptance Criteria**\n%s\n" \
              "$current_section" "$story" "$ac")

            existing=$(gh issue list \
              --repo "$REPO" \
              --state all \
              --search "\"$title\" in:title" \
              --json title \
              --jq ".[] | select(.title == \"$title\") | .title" || true)

            if [ -n "$existing" ]; then
              echo "Skipping existing issue: $title"
            else
              echo "Creating issue: $title"
              gh issue create \
                --repo "$REPO" \
                --title "$title" \
                --body "$body"
            fi

            pending_sn=""
            pending_text=""
          }

          while IFS= read -r line || [ -n "$line" ]; do
            line="${line%$'\r'}"
            trimmed="$(echo "$line" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

            if [ -z "$trimmed" ]; then
              continue
            fi

            # Keep major heading out
            if [[ "$trimmed" == "2. Functional Requirements" ]]; then
              continue
            fi

            # Section heading like 2.1 User Management / 2.2 Shopping
            if [[ "$trimmed" =~ ^[0-9]+\.[0-9]+[[:space:]]+ ]]; then
              flush_row
              current_section="$trimmed"
              echo "Section: $current_section"
              continue
            fi

            # Skip headers
            if [[ "$trimmed" == "SN" || "$trimmed" == "User Stories" || "$trimmed" == "Acceptance Criteria" || "$trimmed" == "SN User Stories Acceptance Criteria" ]]; then
              continue
            fi

            # Start of a new story row: number followed by text
            if [[ "$trimmed" =~ ^([0-9]+)[[:space:]]+(.+)$ ]]; then
              flush_row
              pending_sn="${BASH_REMATCH[1]}"
              pending_text="${BASH_REMATCH[2]}"
              continue
            fi

            # Continuation line of current story row
            if [ -n "$pending_sn" ]; then
              pending_text="$pending_text $trimmed"
            fi
          done < "$FILE"

          flush_row
