name: Create Issues from DOCX Table

on:
  workflow_dispatch:

jobs:
  create-issues:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependency
        run: |
          python -m pip install --upgrade pip
          pip install python-docx

      - name: Create issues from stories.docx
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import re
          import subprocess
          from docx import Document

          REPO = "${{ github.repository }}"
          DOCX_PATH = "input/stories.docx"

          def gh(*args):
              result = subprocess.run(
                  ["gh", *args],
                  check=True,
                  capture_output=True,
                  text=True
              )
              return result.stdout.strip()

          def clean_text(text: str) -> str:
              return re.sub(r"\s+", " ", (text or "").strip())

          def make_title(sn: str, story: str) -> str:
              text = clean_text(story)

              text = re.sub(r"^As an? .*?,\s*I want to\s*", "", text, flags=re.I)
              text = re.sub(r"\s+so that.*$", "", text, flags=re.I)
              text = text.strip().rstrip(".")
              text = text[:80].strip()

              if not text:
                  text = f"Story {sn}"

              return f"US{sn} - {text[:1].upper() + text[1:]}"

          def issue_exists(sn: str) -> bool:
              result = subprocess.run(
                  [
                      "gh", "issue", "list",
                      "--repo", REPO,
                      "--state", "all",
                      "--search", f"\"US{sn} -\" in:title",
                      "--json", "title",
                      "--jq", f'.[] | select(.title | startswith("US{sn} -")) | .title'
                  ],
                  capture_output=True,
                  text=True
              )
              return bool(result.stdout.strip())

          doc = Document(DOCX_PATH)

          current_section = "General"
          seen = 0

          for table in doc.tables:
              rows = table.rows
              if not rows:
                  continue

              header = [clean_text(c.text) for c in rows[0].cells[:3]]
              if len(header) < 3:
                  continue

              if header[0] != "SN" or header[1] != "User Stories" or header[2] != "Acceptance Criteria":
                  continue

              # find nearest heading before this table
              # fallback uses last non-empty paragraph matching x.y heading
              for p in doc.paragraphs:
                  txt = clean_text(p.text)
                  if re.match(r"^\d+\.\d+\s+", txt):
                      current_section = txt

              for row in rows[1:]:
                  cells = row.cells
                  if len(cells) < 3:
                      continue

                  sn = clean_text(cells[0].text)
                  story = clean_text(cells[1].text)
                  ac_raw = cells[2].text.strip()

                  if not re.fullmatch(r"\d+", sn):
                      continue
                  if not story:
                      continue

                  title = make_title(sn, story)

                  ac_lines = []
                  for line in ac_raw.splitlines():
                      line = line.strip()
                      if line:
                          ac_lines.append(line)

                  body_parts = [
                      f"**Section:** {current_section}",
                      "",
                      "**User Story**",
                      story,
                      "",
                      "**Acceptance Criteria**",
                  ]

                  if ac_lines:
                      body_parts.extend(ac_lines)
                  elif ac_raw.strip():
                      body_parts.append(ac_raw.strip())
                  else:
                      body_parts.append("No acceptance criteria provided.")

                  body = "\n".join(body_parts)

                  if issue_exists(sn):
                      print(f"Skipping existing issue: US{sn}")
                      continue

                  print(f"Creating issue: {title}")
                  subprocess.run(
                      [
                          "gh", "issue", "create",
                          "--repo", REPO,
                          "--title", title,
                          "--body", body
                      ],
                      check=True
                  )
                  seen += 1

          print(f"Done. Created {seen} issue(s).")
          PY
