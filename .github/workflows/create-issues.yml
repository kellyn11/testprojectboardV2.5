name: Create Issues from Table Markdown

on:
  workflow_dispatch:

jobs:
  create-issues:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Authenticate GitHub CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh auth status

      - name: Create issues from stories.md
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          FILE="output/stories.md"

          if [ ! -f "$FILE" ]; then
            echo "Missing $FILE"
            exit 1
          fi

          current_section="General"

          while IFS= read -r line || [ -n "$line" ]; do
            line="${line%$'\r'}"
            trimmed="$(echo "$line" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

            # Section heading like: 2.1 User Management
            if [[ "$trimmed" =~ ^[0-9]+\.[0-9]+[[:space:]]+ ]]; then
              current_section="$trimmed"
              echo "Section: $current_section"
              continue
            fi

            # Markdown pipe table row
            if [[ "$trimmed" =~ ^\| ]]; then
              # Skip header separator rows like |---|
              if [[ "$trimmed" =~ ^\|[[:space:]-]+\|[[:space:]-]+\| ]]; then
                continue
              fi

              # Remove first and last pipe
              row="$(echo "$trimmed" | sed 's/^|//;s/|$//')"

              sn="$(echo "$row" | cut -d'|' -f1 | xargs)"
              story="$(echo "$row" | cut -d'|' -f2 | xargs)"
              ac="$(echo "$row" | cut -d'|' -f3- | sed 's/^ *//;s/ *$//')"

              # Skip header row
              if [[ "$sn" == "SN" || "$story" == "User Stories" ]]; then
                continue
              fi

              # Only process numbered rows
              if ! [[ "$sn" =~ ^[0-9]+$ ]]; then
                continue
              fi

              title="US${sn}"

              body=$(printf "**Section:** %s\n\n**User Story**\n%s\n\n**Acceptance Criteria**\n%s\n" \
                "$current_section" "$story" "$ac")

              existing=$(gh issue list \
                --repo "$REPO" \
                --state all \
                --search "\"$title\" in:title" \
                --json title \
                --jq ".[] | select(.title == \"$title\") | .title" || true)

              if [ -n "$existing" ]; then
                echo "Skipping existing issue: $title"
              else
                echo "Creating issue: $title"
                gh issue create \
                  --repo "$REPO" \
                  --title "$title" \
                  --body "$body"
              fi
            fi
          done < "$FILE"
